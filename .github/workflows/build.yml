name: build

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 1 * *"

jobs:
  build-linux-ubuntu:
    runs-on: ubuntu-latest
    steps:
      - name: install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install libcurl4-openssl-dev libxml2-dev
      - name: prepare environment
        run: |
          echo "target_triplet=`gcc -dumpmachine`" >> $GITHUB_ENV
      - name: fetch libplist
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{secrets.GITHUB_TOKEN}}
          workflow: build.yml
          name: libplist-latest_${{env.target_triplet}}
          repo: libimobiledevice/libplist
      - name: fetch libusbmuxd
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{secrets.GITHUB_TOKEN}}
          workflow: build.yml
          name: libusbmuxd-latest_${{env.target_triplet}}
          repo: libimobiledevice/libusbmuxd
      - name: fetch libimobiledevice-glue
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{secrets.GITHUB_TOKEN}}
          workflow: build.yml
          name: libimobiledevice-glue-latest_${{env.target_triplet}}
          repo: libimobiledevice/libimobiledevice-glue
      - name: fetch libimobiledevice
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{secrets.GITHUB_TOKEN}}
          workflow: build.yml
          name: libimobiledevice-latest_${{env.target_triplet}}
          repo: libimobiledevice/libimobiledevice
      - name: install external dependencies
        run: |
          mkdir extract
          for I in *.tar; do
            tar -C extract -xvf $I
          done
          rm -rf extract/lib
          sudo cp -r extract/* /
          sudo ldconfig
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: autogen
        run: ./autogen.sh PKG_CONFIG_PATH=/usr/local/lib/pkgconfig
      - name: make
        run: make
      - name: make install
        run: sudo make install
      - name: prepare artifact
        run: |
          mkdir -p dest
          DESTDIR=`pwd`/dest make install
          tar -C dest -cf libideviceactivation.tar usr
      - name: publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: libideviceactivation-latest_${{env.target_triplet}}
          path: libideviceactivation.tar
  build-macOS:
    runs-on: macOS-latest
    steps:
      - name: install dependencies
        run: |
          if test -x "`which port`"; then
            sudo port install libtool autoconf automake pkgconfig
          else
            brew install libtool autoconf automake pkgconfig
          fi
        shell: bash
      - name: fetch libplist
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{secrets.GITHUB_TOKEN}}
          workflow: build.yml
          name: libplist-latest_macOS
          repo: libimobiledevice/libplist
      - name: fetch libusbmuxd
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{secrets.GITHUB_TOKEN}}
          workflow: build.yml
          name: libusbmuxd-latest_macOS
          repo: libimobiledevice/libusbmuxd
      - name: fetch libimobiledevice-glue
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{secrets.GITHUB_TOKEN}}
          workflow: build.yml
          name: libimobiledevice-glue-latest_macOS
          repo: libimobiledevice/libimobiledevice-glue
      - name: fetch libimobiledevice
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{secrets.GITHUB_TOKEN}}
          workflow: build.yml
          name: libimobiledevice-latest_macOS
          repo: libimobiledevice/libimobiledevice
      - name: install external dependencies
        run: |
          mkdir extract
          for I in *.tar; do
            tar -C extract -xvf $I
          done
          sudo cp -r extract/* /
      - uses: actions/checkout@v4
      - name: install additional requirements
        run: |
          SDKDIR=`xcrun --sdk macosx --show-sdk-path 2>/dev/null`
          echo "SDKDIR=$SDKDIR" >> $GITHUB_ENV
          TESTARCHS="arm64 x86_64"
          USEARCHS=
          for ARCH in $TESTARCHS; do
            if echo "int main(int argc, char **argv) { return 0; }" |clang -arch $ARCH -o /dev/null -isysroot $SDKDIR -x c - 2>/dev/null; then
              USEARCHS="$USEARCHS -arch $ARCH"
            fi
          done
          export CFLAGS="$USEARCHS -isysroot $SDKDIR"
          echo "Using CFLAGS: $CFLAGS"
          echo "BUILD_CFLAGS=$CFLAGS" >> $GITHUB_ENV
      - name: autogen
        run: |
          export CFLAGS="${{env.BUILD_CFLAGS}} -Wno-nullability-completeness -Wno-expansion-to-defined"
          echo "Using CFLAGS: $CFLAGS"
          ./autogen.sh PKG_CONFIG_PATH=/usr/local/lib/pkgconfig \
              libcurl_CFLAGS="-I${{env.SDKDIR}}/usr/include" libcurl_LIBS="-lcurl" \
              libxml2_CFLAGS="-I${{env.SDKDIR}}/usr/include" libxml2_LIBS="-lxml2" \
              libimobiledevice_CFLAGS="-I/usr/local/include" libimobiledevice_LIBS="-L/usr/local/lib -limobiledevice-1.0"
      - name: make
        run: make
      - name: make install
        run: sudo make install
      - name: prepare artifact
        run: |
          mkdir -p dest
          DESTDIR=`pwd`/dest make install
          tar -C dest -cf libideviceactivation.tar usr
      - name: publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: libideviceactivation-latest_macOS
          path: libideviceactivation.tar
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    strategy:
      fail-fast: false
      matrix:
        include:
          [{ msystem: MINGW64, arch: x86_64 }, { msystem: MINGW32, arch: i686 }]
    steps:
      - uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          release: false
          update: false
          install: >-
            base-devel
            git
            mingw-w64-${{ matrix.arch }}-gcc
            mingw-w64-${{ matrix.arch }}-pkg-config
            mingw-w64-${{ matrix.arch }}-openssl
            mingw-w64-${{ matrix.arch }}-libxml2
            mingw-w64-${{ matrix.arch }}-curl
            make
            libtool
            autoconf
            automake-wrapper
      - name: prepare environment
        run: |
          dest=`echo ${{ matrix.msystem }} |tr [:upper:] [:lower:]`
          echo "dest=$dest" >> $GITHUB_ENV
          echo "target_triplet=`gcc -dumpmachine`" >> $GITHUB_ENV
      - name: fetch libplist
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{secrets.GITHUB_TOKEN}}
          workflow: build.yml
          name: libplist-latest_${{ matrix.arch }}-${{ env.dest }}
          repo: libimobiledevice/libplist
      - name: fetch libusbmuxd
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{secrets.GITHUB_TOKEN}}
          workflow: build.yml
          name: libusbmuxd-latest_${{ matrix.arch }}-${{ env.dest }}
          repo: libimobiledevice/libusbmuxd
      - name: fetch libimobiledevice-glue
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{secrets.GITHUB_TOKEN}}
          workflow: build.yml
          name: libimobiledevice-glue-latest_${{ matrix.arch }}-${{ env.dest }}
          repo: libimobiledevice/libimobiledevice-glue
      - name: fetch libimobiledevice
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{secrets.GITHUB_TOKEN}}
          workflow: build.yml
          name: libimobiledevice-latest_${{ matrix.arch }}-${{ env.dest }}
          repo: libimobiledevice/libimobiledevice
      - name: install external dependencies
        run: |
          mkdir extract
          for I in *.tar; do
            tar -C extract -xvf $I
          done
          cp -r extract/* /
      - uses: actions/checkout@v4
      - name: install additional requirements
        run: |
          mkdir deps
          # Update to libcurl 8.10.1 (latest stable version as of 2024) for better curl_mime_* API support
          FILENAME="libcurl-8.10.1-static.tar.bz2"
          echo "Downloading libcurl 8.10.1 for ${{matrix.arch}}-${{env.dest}}..."
          # Try the updated gist URL first, fallback to building from source if needed
          if ! curl -o $FILENAME.b64 -Ls --fail "https://gist.github.com/nikias/6c397a0a2f4f4eafd91b81cccd22b761/raw/libcurl-8.10.1-static-${{matrix.arch}}-${{env.dest}}.tar.bz2"; then
            echo "Pre-built libcurl 8.10.1 not found, falling back to 8.8.0..."
            if ! curl -o $FILENAME.b64 -Ls --fail "https://gist.github.com/nikias/6c397a0a2f4f4eafd91b81cccd22b761/raw/libcurl-8.8.0-static-${{matrix.arch}}-${{env.dest}}.tar.bz2"; then
              echo "Pre-built libcurl 8.8.0 not found, using pacman to install newer libcurl..."
              # Install newer libcurl via pacman
              pacman -S --noconfirm mingw-w64-${{ matrix.arch }}-curl
              echo "LIBCURL_CFLAGS=" >> $GITHUB_ENV
              echo "LIBCURL_LIBS=-lcurl" >> $GITHUB_ENV
              exit 0
            else
              FILENAME="libcurl-8.8.0-static.tar.bz2"
            fi
          fi
          base64 -d < $FILENAME.b64 > $FILENAME
          tar -C deps -xjf $FILENAME
          echo "LIBCURL_CFLAGS=-I`pwd`/deps/include -DCURL_STATICLIB" >> $GITHUB_ENV
          echo "LIBCURL_LIBS=-Xlinker `pwd`/deps/lib/libcurl.a -Xlinker /${{env.dest}}/lib/libzstd.a -Xlinker /${{env.dest}}/lib/libz.a -Xlinker -lws2_32 -Xlinker -lcrypt32 -Xlinker -lwldap32 -Xlinker -lbcrypt -Xlinker -lssl -Xlinker -lcrypto" >> $GITHUB_ENV
      - name: autogen
        run: ./autogen.sh libcurl_CFLAGS="${{env.LIBCURL_CFLAGS}}" libcurl_LIBS="${{env.LIBCURL_LIBS}}"
      - name: check libcurl version and mime API support
        run: |
          echo "Checking libcurl version and API support..."
          echo "#include <curl/curl.h>" > test_curl.c
          echo "#include <stdio.h>" >> test_curl.c
          echo "int main() {" >> test_curl.c
          echo '  printf("libcurl version: %s\\n", LIBCURL_VERSION);' >> test_curl.c
          echo "#ifdef CURL_MIME_H" >> test_curl.c
          echo '  printf("curl_mime API: supported\\n");' >> test_curl.c
          echo "#else" >> test_curl.c
          echo '  printf("curl_mime API: NOT supported\\n");' >> test_curl.c
          echo "#endif" >> test_curl.c
          echo "  return 0;" >> test_curl.c
          echo "}" >> test_curl.c
          gcc ${{env.LIBCURL_CFLAGS}} test_curl.c -o test_curl ${{env.LIBCURL_LIBS}} || echo "Compilation failed, using system libcurl"
          ./test_curl || echo "Test execution failed"
          rm -f test_curl test_curl.c
      - name: make
        run: make
      - name: make install
        run: make install
      - name: prepare artifact
        run: |
          mkdir -p dest
          DESTDIR=`pwd`/dest make install
          tar -C dest -cf libideviceactivation.tar ${{ env.dest }}
      - name: publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: libideviceactivation-latest_${{ matrix.arch }}-${{ env.dest }}
          path: libideviceactivation.tar
